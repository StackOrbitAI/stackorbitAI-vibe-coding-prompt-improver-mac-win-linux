name: Build & Release — All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════
  # Windows Build (.exe NSIS installer)
  # x64 + arm64
  # ═══════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps


      - name: Build renderer and main process
        run: npm run build

      - name: Package Windows ${{ matrix.arch }}
        run: npx electron-builder --win --${{ matrix.arch }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: |
            release/*.exe
            release/*.exe.blockmap
          retention-days: 5

  # ═══════════════════════════════════════════
  # macOS Build (.dmg installer)
  # x64 (Intel) + arm64 (Apple Silicon M1/M2/M3/M4)
  # ═══════════════════════════════════════════
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build renderer and main process
        run: npm run build

      - name: Package macOS ${{ matrix.arch }}
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.dmg.blockmap
          retention-days: 5

  # ═══════════════════════════════════════════
  # Linux Build (.AppImage, .deb, .rpm, .tar.gz)
  # x64 + arm64
  # ═══════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies for electron-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libarchive-tools

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build renderer and main process
        run: npm run build

      - name: Package Linux ${{ matrix.arch }}
        run: npx electron-builder --linux --${{ matrix.arch }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.tar.gz
          retention-days: 5

  # ═══════════════════════════════════════════
  # Create GitHub Release with all artifacts
  # ═══════════════════════════════════════════
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all downloaded artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || 'v1.0.0' }}
          name: "Vibe Coding Prompt Improver ${{ github.ref_name || 'v1.0.0' }}"
          body: |
            ### 🪟 Windows (.exe)
            | Architecture | Download Link |
            |---|---|
            | **Windows x64** (Standard 64-bit PC — Recommended) | [⬇️ Download .exe (x64)](https://github.com/StackOrbitAI/stackorbitAI-vibe-coding-prompt-improver-mac-win-linux/releases/download/${{ github.ref_name }}/stackorbitai-vibe-coding-prompt-improver-Setup-${{ github.ref_name }}-x64.exe) |
            | **Windows ARM64** (Snapdragon / Surface) | [⬇️ Download .exe (arm64)](https://github.com/StackOrbitAI/stackorbitAI-vibe-coding-prompt-improver-mac-win-linux/releases/download/${{ github.ref_name }}/stackorbitai-vibe-coding-prompt-improver-Setup-${{ github.ref_name }}-arm64.exe) |
            | **Windows Universal** | [⬇️ Download .exe (Universal)](https://github.com/StackOrbitAI/stackorbitAI-vibe-coding-prompt-improver-mac-win-linux/releases/download/${{ github.ref_name }}/stackorbitai-vibe-coding-prompt-improver-Setup-${{ github.ref_name }}.exe) |

            ### 🍎 macOS (.dmg)
            | Chip Type | Download Link |
            |---|---|
            | **Apple Silicon (M1 / M2 / M3 / M4)** | [⬇️ Download .dmg (arm64)](https://github.com/StackOrbitAI/stackorbitAI-vibe-coding-prompt-improver-mac-win-linux/releases/download/${{ github.ref_name }}/stackorbitai-vibe-coding-prompt-improver-${{ github.ref_name }}-arm64.dmg) |
            | **Intel Mac (x64)** | [⬇️ Download .dmg (x64)](https://github.com/StackOrbitAI/stackorbitAI-vibe-coding-prompt-improver-mac-win-linux/releases/download/${{ github.ref_name }}/stackorbitai-vibe-coding-prompt-improver-${{ github.ref_name }}.dmg) |

            ### 🐧 Linux (.AppImage / .deb / .rpm)
            | Package Format | Architecture | Download Link |
            |---|---|---|
            | **AppImage (x64)** | x86_64 | [⬇️ Download .AppImage](https://github.com/StackOrbitAI/stackorbitAI-vibe-coding-prompt-improver-mac-win-linux/releases/download/${{ github.ref_name }}/stackorbitai-vibe-coding-prompt-improver-${{ github.ref_name }}.AppImage) |
            | **AppImage (arm64)** | arm64 | [⬇️ Download .AppImage (arm64)](https://github.com/StackOrbitAI/stackorbitAI-vibe-coding-prompt-improver-mac-win-linux/releases/download/${{ github.ref_name }}/stackorbitai-vibe-coding-prompt-improver-${{ github.ref_name }}-arm64.AppImage) |
            | **Debian / Ubuntu (.deb)** | amd64 | [⬇️ Download .deb](https://github.com/StackOrbitAI/stackorbitAI-vibe-coding-prompt-improver-mac-win-linux/releases/download/${{ github.ref_name }}/stackorbitai-vibe-coding-prompt-improver_${{ github.ref_name }}_amd64.deb) |
            | **Debian / Ubuntu (.deb)** | arm64 | [⬇️ Download .deb (arm64)](https://github.com/StackOrbitAI/stackorbitAI-vibe-coding-prompt-improver-mac-win-linux/releases/download/${{ github.ref_name }}/stackorbitai-vibe-coding-prompt-improver_${{ github.ref_name }}_arm64.deb) |
            | **Fedora / RHEL (.rpm)** | x86_64 | [⬇️ Download .rpm](https://github.com/StackOrbitAI/stackorbitAI-vibe-coding-prompt-improver-mac-win-linux/releases/download/${{ github.ref_name }}/stackorbitai-vibe-coding-prompt-improver-${{ github.ref_name }}.x86_64.rpm) |
            | **Fedora / RHEL (.rpm)** | aarch64 | [⬇️ Download .rpm (aarch64)](https://github.com/StackOrbitAI/stackorbitAI-vibe-coding-prompt-improver-mac-win-linux/releases/download/${{ github.ref_name }}/stackorbitai-vibe-coding-prompt-improver-${{ github.ref_name }}.aarch64.rpm) |
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.exe.blockmap
            artifacts/**/*.dmg
            artifacts/**/*.dmg.blockmap
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

